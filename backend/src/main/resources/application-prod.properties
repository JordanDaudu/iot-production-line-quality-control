spring.application.name=smart-iot-quality-inspection

# Render provides PORT. Locally it falls back to 8080.
server.port=${PORT:8080}

# Neon PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 in production
spring.h2.console.enabled=false

# Simulation
simulation.tick-interval-ms=3000

# Sensor health
sensor.health-check-interval-ms=5000
sensor.offline-threshold-ms=10000
sensor.heartbeat-interval-ms=5000

# Logging
logging.level.com.smartiot=INFO
logging.level.org.springframework.web.socket=INFO
