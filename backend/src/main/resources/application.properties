spring.application.name=smart-iot-quality-inspection
server.port=8080

# ===== H2 file database (default course/Replit demo) =====
# AUTO_SERVER allows the H2 console and the app to share the same file.
spring.datasource.url=jdbc:h2:file:./data/inspection;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== To switch to PostgreSQL later, comment the H2 block above and use: =====
# spring.datasource.url=jdbc:postgresql://localhost:5432/inspection
# spring.datasource.username=postgres
# spring.datasource.password=postgres

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 web console (debug aid) at http://localhost:8080/h2-console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Simulation =====
# How often (ms) the virtual sensors emit one production cycle while running.
simulation.tick-interval-ms=3000

# ===== Sensor health =====
# How often (ms) to check for offline sensors, and how long without a reading before a
# sensor is considered offline.
sensor.health-check-interval-ms=5000
sensor.offline-threshold-ms=10000
# How often each enabled sensor emits a heartbeat while the simulation runs.
sensor.heartbeat-interval-ms=5000

# ===== Logging =====
logging.level.com.smartiot=INFO
logging.level.org.springframework.web.socket=INFO
